<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryo Studios | Staff Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0b0c; color: white; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .login-box { background: #161618; padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); width: 100%; max-width: 320px; text-align: center; z-index: 1000; position: relative; }
        h2 { margin: 0 0 10px; letter-spacing: -1px; }
        p { color: #b1b1b3; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #5e6ad2; color: white; font-weight: 600; cursor: pointer; }
        .error { color: #ff4d4d; font-size: 13px; margin-bottom: 15px; display: none; }
        #nc-root { display: none; } /* Oculto hasta que loguees */
    </style>
</head>
<body>

    <div id="login-form" class="login-box">
        <div style="font-size: 30px; margin-bottom: 10px;">⚡</div>
        <h2>Staff Access</h2>
        <p>Solo personal autorizado</p>
        <div id="error-msg" class="error">Credenciales incorrectas</div>
        <input type="text" id="user" placeholder="Admin Name">
        <input type="password" id="key" placeholder="Access Key">
        <button onclick="checkLogin()">Entrar</button>
    </div>

    <script src="admins.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
        function checkLogin() {
            const u = document.getElementById('user').value;
            const k = document.getElementById('key').value;
            
            if (window.listaAdmins && window.listaAdmins[u] === k) {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('nc-root').style.display = 'block';
                initCMS();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function initCMS() {
            CMS.init({
                config: {
                    load_config_file: false,
                    display_url: "https://ryostudios.netlify.app",
                    backend: { 
                        name: "github", 
                        repo: "Elauullido/RyoStudios", // CAMBIA ESTO POR TU REPO (Ej: "Elauullido/RyoStudios")
                        branch: "main" 
                    },
                    media_folder: "images",
                    collections: [{
                        name: "eventos", label: "Eventos", folder: "content/eventos", create: true,
                        fields: [
                            {label: "Título", name: "title", widget: "string"},
                            {label: "Estado", name: "status", widget: "select", options: ["En Vivo", "Próximamente", "Finalizado"]},
                            {label: "Descripción", name: "body", widget: "text"}
                        ]
                    }]
                }
            });
        }
    </script>
</body>
</html>
